<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo Agrinho 2026: Agro Forte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Agrinho 2026: Agro Forte 🌾</h1>
        <p class="subtitle">Mostre que você entende tudo sobre a força e a sustentabilidade do nosso agro!</p>
        
        <div id="quiz-box">
            <div id="question">Carregando pergunta...</div>
            <div id="options-buttons" class="btn-grid">
                </div>
        </div>

        <div id="result-box" class="hide">
            <h2>Parabéns! Você concluiu a jornada.</h2>
            <p id="score-text"></p>
            <button id="restart-btn" onclick="restartGame()">Jogar Novamente</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
